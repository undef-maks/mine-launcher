<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Minecraft Launcher</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="text/javascript" src="/eel.js"></script>
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <h1>MINECRAFT</h1>

        <label class="input-label">Нікнейм</label>
        <input type="text" id="username" placeholder="Введіть нік..." />

        <label class="input-label">Ваші збірки / Профілі</label>
        <div class="custom-select-wrapper">
          <select id="profile-select">
            <option value="" disabled selected>
              Оберіть або створіть збірку
            </option>
          </select>
        </div>

        <button
          id="open-create-modal-btn"
          class="secondary-btn"
          style="margin-bottom: 20px"
        >
          + Створити збірку
        </button>

        <div id="active-profile-info" style="display: none">
          <label class="input-label">Конфігурація профілю</label>
          <div class="profile-details-box">
            <div>
              Версія гри: <span id="info-mc-version" class="highlight">-</span>
            </div>
            <div>
              Завантажувач: <span id="info-loader" class="highlight">-</span>
            </div>
            <div id="info-repo-container" style="display: none">
              GitHub: <span id="info-repo-status" class="highlight">-</span>
            </div>
          </div>

          <div
            id="loader-version-wrapper"
            style="display: none; margin-top: 15px"
          >
            <label class="input-label">Версія мод-лоадера</label>
            <div class="custom-select-wrapper">
              <select id="loader-version-select">
                <option value="" disabled selected>Оберіть версію</option>
              </select>
            </div>
          </div>
        </div>

        <button id="open-folder-btn" style="margin-top: auto">
          Відкрити папку гри
        </button>
      </aside>

      <div id="modal-overlay" class="modal-hidden">
        <div class="modal-box">
          <h2>Створення збірки</h2>

          <label class="input-label">Назва збірки</label>
          <input
            type="text"
            id="modal-profile-name"
            placeholder="Наприклад: My Modpack"
          />

          <div class="creation-type-container">
            <label>
              <input type="radio" name="creation-type" value="manual" checked />
              <span>Вручну</span>
            </label>
            <label>
              <input type="radio" name="creation-type" value="github" />
              <span>З GitHub</span>
            </label>
          </div>

          <div id="manual-creation-fields">
            <label class="input-label">Версія гри</label>
            <div class="custom-select-wrapper">
              <select id="modal-version-select">
                <option value="" disabled selected>Оберіть версію</option>
              </select>
            </div>

            <label class="input-label">Завантажувач</label>
            <div class="custom-select-wrapper">
              <select id="modal-loader-select">
                <option value="vanilla">Vanilla</option>
                <option value="fabric">Fabric</option>
                <option value="forge">Forge</option>
                <option value="neoforge">NeoForge</option>
              </select>
            </div>
          </div>

          <div id="github-creation-fields" style="display: none">
            <label class="input-label">Посилання на репозиторій</label>
            <input
              type="text"
              id="modal-repo-url"
              placeholder="https://github.com/user/repo"
            />
            <p class="modal-desc">
              Лаунчер автоматично зчитає конфіг з файлу
              <code style="color: #0ff">settings.json</code> в репозиторії.
            </p>
          </div>

          <div class="modal-buttons">
            <button id="cancel-btn" class="danger-btn">Скасувати</button>
            <button id="save-btn">Зберегти</button>
          </div>
        </div>
      </div>

      <main class="main-content">
        <div id="log-container"></div>
        <div class="hero-area">
          <div id="progress-wrapper"><div id="progress-bar"></div></div>
          <p id="status"></p>
          <button id="play-btn">ГРАТИ</button>
        </div>
      </main>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
