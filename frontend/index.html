<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Minecraft Launcher</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="text/javascript" src="/eel.js"></script>
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <h1>MINECRAFT</h1>

        <label class="input-label">Нікнейм</label>
        <input type="text" id="username" placeholder="Введіть нік..." />

       <label class="input-label">Ваші збірки / Профілі</label>
        <div style="display: flex; gap: 8px; align-items: stretch; margin-bottom: 20px; width: 100%;">
          <div class="custom-select-wrapper" style="flex: 1; margin-bottom: 0;">
            <select id="profile-select" style="width: 100%; height: 100%;">
              <option value="" disabled selected>
                Оберіть або створить збірку
              </option>
            </select>
          </div>
          <button id="delete-profile-btn" title="Видалити збірку" 
                  style="background: #ff4d4d; color: white; border: none; border-radius: 6px; width: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: background 0.2s; padding: 0; flex-shrink: 0;"
                  onmouseover="this.style.background='#e03e3e'" 
                  onmouseout="this.style.background='#ff4d4d'">
            🗑️
          </button>
        </div>

        <button
          id="open-create-modal-btn"
          class="secondary-btn"
          style="margin-bottom: 20px; width: 100%;"
        >
          + Створити збірку
        </button>

        <div id="active-profile-info" style="display: none">
          <label class="input-label">Конфігурація профілю</label>
          <div class="profile-details-box">
            <div>
              Версія гри: <span id="info-mc-version" class="highlight">-</span>
            </div>
            <div>
              Завантажувач: <span id="info-loader" class="highlight">-</span>
            </div>
            <div id="info-repo-container" style="display: none">
              GitHub: <span id="info-repo-status" class="highlight">-</span>
            </div>
          </div>

          <div
            id="loader-version-wrapper"
            style="display: none; margin-top: 15px"
          >
            <label class="input-label">Версія мод-лоадера</label>
            <div class="custom-select-wrapper">
              <select id="loader-version-select">
                <option value="" disabled selected>Оберіть версію</option>
              </select>
            </div>
          </div>
        </div>

        <div
          class="sidebar-footer"
          style="margin-top: auto; display: flex; gap: 10px"
        >
          <button id="open-folder-btn" style="padding: 10px; font-size: 12px">
            Папка гри
          </button>
          <button
            id="open-settings-btn"
            class="secondary-btn"
            style="padding: 10px; font-size: 12px; flex-shrink: 0; width: auto"
          >
            ⚙ Налаштування
          </button>
        </div>
      </aside>

      <div id="modal-overlay" class="modal-hidden">
        <div class="modal-box">
          <h2>Створення збірки</h2>

          <label class="input-label">Назва збірки</label>
          <input
            type="text"
            id="modal-profile-name"
            placeholder="Наприклад: My Modpack"
          />

          <div class="creation-type-container">
            <label>
              <input type="radio" name="creation-type" value="manual" checked />
              <span>Вручну</span>
            </label>
            <label>
              <input type="radio" name="creation-type" value="github" />
              <span>З GitHub</span>
            </label>
          </div>

          <div id="manual-creation-fields">
            <label class="input-label">Версія гри</label>
            <div class="custom-select-wrapper">
              <select id="modal-version-select">
                <option value="" disabled selected>Оберіть версію</option>
              </select>
            </div>

            <label class="input-label">Завантажувач</label>
            <div class="custom-select-wrapper">
              <select id="modal-loader-select">
                <option value="vanilla">Vanilla</option>
                <option value="fabric">Fabric</option>
                <option value="forge">Forge</option>
                <option value="neoforge">NeoForge</option>
              </select>
            </div>
          </div>

          <div id="github-creation-fields" style="display: none">
            <label class="input-label">Посилання на репозиторій</label>
            <input
              type="text"
              id="modal-repo-url"
              placeholder="https://github.com/user/repo"
            />
            <p class="modal-desc">
              Лаунчер автоматично зчитає конфіг з файлу
              <code style="color: #0ff">settings.json</code> в репозиторії.
            </p>
          </div>

          <div
            class="modal-buttons"
            style="display: flex; gap: 10px; margin-top: 20px"
          >
            <button id="cancel-btn" class="danger-btn">Скасувати</button>
            <button id="save-btn">Зберегти</button>
          </div>
        </div>
      </div>

      <div id="settings-modal-overlay" class="modal-hidden">
        <div class="modal-box">
          <h2>Налаштування лаунчера</h2>

          <label class="input-label">Виділена оперативна пам'ять (RAM)</label>
          <div class="custom-select-wrapper" style="margin-bottom: 20px">
            <select id="ram-select">
              <option value="2G">2 ГБ</option>
              <option value="4G" selected>4 ГБ (Рекомендовано)</option>
              <option value="6G">6 ГБ</option>
              <option value="8G">8 ГБ</option>
              <option value="12G">12 ГБ</option>
              <option value="16G">16 ГБ</option>
            </select>
          </div>

          <label class="input-label">Графічний адаптер (GPU)</label>
          <div class="custom-select-wrapper" style="margin-bottom: 25px">
            <select id="gpu-select">
              <option value="auto" selected>
                Автоматично (За замовчуванням)
              </option>
            </select>
          </div>

          <div class="modal-buttons" style="display: flex; gap: 10px">
            <button id="settings-close-btn" style="width: 100%">Закрити</button>
          </div>
        </div>
      </div>

      <main class="main-content">
        <div id="log-container"></div>
        <div class="hero-area">
          <div id="progress-wrapper"><div id="progress-bar"></div></div>
          <p id="status"></p>
          <button id="play-btn">ГРАТИ</button>
        </div>
      </main>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
